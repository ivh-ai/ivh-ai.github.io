<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Job Search Tracker — Interactive Demo | Ishaan Hattangady</title>
<meta name="description" content="Interactive demo of Job Search Tracker, a job-application tracker built with Claude Code. Fictional sample data — changes reset on refresh.">
<link rel="stylesheet" href="styles.css">
<style>
  /* Static demo build: always-on demo mode, so the live toggle is hidden and a
     back-to-portfolio link replaces it. */
  .demo-switch { display: none; }
  .demo-back { color: var(--muted); text-decoration: none; font-size: 13px; padding: 7px 10px; border-radius: 8px; }
  .demo-back:hover { color: var(--text); background: var(--surface-2); }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="brand-mark">◆</span><strong>Job Search Tracker</strong><span class="dim">demo</span></div>
  <nav class="tabs">
    <button class="nav-tab" data-tab="overview">Overview</button>
    <button class="nav-tab" data-tab="board">Board</button>
  </nav>
  <a class="demo-back" href="../index.html#projects">← Portfolio</a>
  <label class="demo-switch"><input type="checkbox" id="demo-toggle"> Demo data</label>
  <button class="btn primary" id="add-job">+ Add job</button>
</header>
<div id="demo-banner" class="demo-banner">Interactive demo with fictional sample data. Drag cards, open a job to log interview rounds, add a posting by URL — every change is simulated in your browser, resets on refresh, and is never saved. Built with Claude Code.</div>
<main id="view"><p class="dim" style="padding:24px">Loading…</p></main>
<div id="modal"></div>
<aside id="drawer"></aside>
<!-- demo-data.js MUST load before app.js: it forces demo mode and shims the API. -->
<script src="demo-data.js"></script>
<script src="app.js"></script>
</body>
</html>
